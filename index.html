<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MelOS</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
}

/* HEADER */
header {
    display:flex;
    justify-content:space-between;
    padding:20px;
    border-bottom:1px solid #1e293b;
}

header a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

/* HERO */
.hero {
    text-align:center;
    padding:100px 20px;
}

.hero h1 {
    font-size:42px;
}

.hero p {
    color:#94a3b8;
}

/* BUTTON */
.btn {
    background:#38bdf8;
    padding:12px 20px;
    border-radius:10px;
    margin-top:20px;
    display:inline-block;
}

/* FEATURES */
.section {
    padding:60px 20px;
    text-align:center;
}

.cards {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:#1e293b;
    margin:10px;
    padding:20px;
    border-radius:15px;
    width:250px;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

/* DOWNLOAD */
.download {
    padding:60px 20px;
    text-align:center;
}

button {
    padding:12px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    cursor:pointer;
}

/* FOOTER */
footer {
    padding:20px;
    text-align:center;
    border-top:1px solid #1e293b;
    color:#94a3b8;
}
</style>

</head>

<body>

<header>
    <h2>🚀 MelOS</h2>
    <div>
        <a href="#features">Features</a>
        <a href="#download">Download</a>
    </div>
</header>

<div class="hero">
    <h1>Dein eigenes System</h1>
    <p>Apps • Server • Lizenzsystem in einem Projekt</p>
    <div class="btn">Jetzt starten</div>
</div>

<div class="section" id="features">
    <h2>✨ Features</h2>
    <div class="cards">
        <div class="card">🔐 Lizenzsystem</div>
        <div class="card">📱 Mobile Apps</div>
        <div class="card">🌐 Server Backend</div>
        <div class="card">⚡ Aktivierung</div>
        <div class="card">🛡️ Sicherheit</div>
        <div class="card">🚀 Modern</div>
    </div>
</div>

<div class="download" id="download">
    <h2>📥 Download</h2>

    <a href="MelOS.apk">
        <button>📱 MelOS App</button>
    </a>

    <p style="color:#facc15;">
        ⚠️ Android: Unbekannte Apps erlauben
    </p>
</div>

<footer>
    © 2026 MelOS System
</footer>

</body>
</html>
